version: "3.9"

name: techpro-crm

services:

  postgres:
    image: postgres:16
    container_name: techpro-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: techpro
      POSTGRES_PASSWORD: techpro123
      POSTGRES_DB: techpro_crm

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techpro"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - techpro_network

  backend:

    build:
      context: ./backend

    container_name: techpro-backend

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    networks:
      - techpro_network

  frontend:

    image: nginx:latest

    container_name: techpro-frontend

    restart: unless-stopped

    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - techpro_network

volumes:

  postgres_data:

networks:

  techpro_network:
