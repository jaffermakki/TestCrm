version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: techpro_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-techpro_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SuperSecretPassword2026!}
      POSTGRES_DB: ${DB_NAME:-techpro_crm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: 
      context: ./backend
    container_name: techpro_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-techpro_admin}:${DB_PASSWORD:-SuperSecretPassword2026!}@db:5432/${DB_NAME:-techpro_crm}
      SECRET_KEY: ${JWT_SECRET_KEY:-your-256-bit-secret-key-here}
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    container_name: techpro_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/conf.d:/etc/nginx/conf.d

volumes:
  pgdata:
